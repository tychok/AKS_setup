{{- if .Values.gateway.enabled }}
# ═══════════════════════════════════════════════════════════════
# HTTPRoute — routes external traffic via the shared Gateway
# (Application Gateway for Containers)
# ═══════════════════════════════════════════════════════════════
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "business-app.name" . }}
  labels:
    {{- include "business-app.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: {{ .Values.gateway.listenerName }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: {{ .Values.gateway.pathType }}
            value: {{ .Values.gateway.path }}
      {{- if .Values.gateway.rateLimitRPS }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: alb.networking.azure.io
            kind: RateLimitPolicy
            name: {{ include "business-app.name" . }}-rate-limit
      {{- end }}
      backendRefs:
        - name: {{ include "business-app.name" . }}
          port: {{ .Values.service.port }}
{{- if .Values.gateway.rateLimitRPS }}
---
apiVersion: alb.networking.azure.io/v1
kind: RateLimitPolicy
metadata:
  name: {{ include "business-app.name" . }}-rate-limit
  labels:
    {{- include "business-app.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "business-app.name" . }}
  default:
    rules:
      - limit:
          requestsPerSecond: {{ .Values.gateway.rateLimitRPS }}
{{- end }}
{{- end }}
