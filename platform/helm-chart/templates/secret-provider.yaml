{{- if .Values.keyVaultSecrets.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "business-app.name" . }}
  labels:
    {{- include "business-app.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVaultSecrets.vaultName }}
    tenantId: {{ .Values.workloadIdentity.tenantId | default "" | quote }}
    objects: |
      array:
        {{- range .Values.keyVaultSecrets.secrets }}
        - |
          objectName: {{ .key }}
          objectType: secret
          objectAlias: {{ .name }}
        {{- end }}
{{- end }}
