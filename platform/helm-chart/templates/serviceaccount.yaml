{{- if .Values.workloadIdentity.enabled }}
# ═══════════════════════════════════════════════════════════════
# ServiceAccount — bound to an Azure Managed Identity via
# Entra ID Workload Identity federation.
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "business-app.name" . }}
  labels:
    {{- include "business-app.labels" . | nindent 4 }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.workloadIdentity.clientId | quote }}
    {{- if .Values.workloadIdentity.tenantId }}
    azure.workload.identity/tenant-id: {{ .Values.workloadIdentity.tenantId | quote }}
    {{- end }}
{{- end }}
