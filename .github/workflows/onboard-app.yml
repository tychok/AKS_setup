# ═══════════════════════════════════════════════════════════════
# Self-service: Onboard a new application to the platform
# ═══════════════════════════════════════════════════════════════
# Each application is deployed into a team namespace. Multiple
# apps can share a namespace. Apps are isolated by default —
# declare peers in values.yaml to allow communication.
# ═══════════════════════════════════════════════════════════════
name: "Onboard New App"

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "Unique application name (lowercase, hyphens only)"
        required: true
        type: string
      namespace:
        description: "Target namespace (team/product name). Created if missing."
        required: true
        type: string
      team:
        description: "Owning team name"
        required: true
        type: string
      host:
        description: "Gateway hostname (leave blank for internal-only apps like DBs)"
        required: false
        type: string
        default: ""
      node-pool:
        description: "Target node pool"
        required: true
        type: choice
        options:
          - standard
          - highmem
          - compute
        default: standard
      peers:
        description: "Comma-separated peers this app can talk to (e.g. my-db:5432,cache:6379). Leave blank for fully isolated."
        required: false
        type: string
        default: ""
      identity-client-id:
        description: "Entra ID Workload Identity client ID (from terraform output). Leave blank to set later."
        required: false
        type: string
        default: ""
      key-vault-secrets:
        description: "Comma-separated Key Vault secret names this app can read (e.g. MyDbPassword,MyApiKey). Leave blank if none."
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.app-name }}" =~ ^[a-z][a-z0-9-]{1,30}$ ]]; then
            echo "::error::App name must be lowercase, start with a letter, hyphens allowed, max 31 chars"
            exit 1
          fi
          if [[ ! "${{ inputs.namespace }}" =~ ^[a-z][a-z0-9-]{1,30}$ ]]; then
            echo "::error::Namespace must be lowercase, start with a letter, hyphens allowed, max 31 chars"
            exit 1
          fi
          if [ -d "apps/${{ inputs.app-name }}" ]; then
            echo "::error::App '${{ inputs.app-name }}' already exists"
            exit 1
          fi

      - name: Generate app values.yaml
        run: |
          mkdir -p apps/${{ inputs.app-name }}
          # Build peer configuration
          EGRESS_PEERS=""
          if [ -n "${{ inputs.peers }}" ]; then
            EGRESS_PEERS=$(echo "${{ inputs.peers }}" | tr ',' '\n' | while IFS=: read -r peer_app peer_port; do
              echo "    - app: ${peer_app}"
              echo "      port: ${peer_port:-8080}"
            done)
          fi

          cat > apps/${{ inputs.app-name }}/values.yaml << VALUESEOF
          # Auto-generated by onboard-app workflow
          # Namespace: ${{ inputs.namespace }}
          appName: ${{ inputs.app-name }}
          team: ${{ inputs.team }}

          image:
            repository: ${{ secrets.ACR_NAME }}.azurecr.io/${{ inputs.app-name }}
            tag: latest

          containerPort: 8080
          nodePool: ${{ inputs.node-pool }}

          gateway:
            enabled: ${{ inputs.host != '' }}
          $( [ -n "${{ inputs.host }}" ] && echo "  host: ${{ inputs.host }}" )

          workloadIdentity:
            enabled: ${{ inputs.identity-client-id != '' }}
          $( [ -n "${{ inputs.identity-client-id }}" ] && echo "  clientId: \"${{ inputs.identity-client-id }}\"" )

          networkPolicy:
            enabled: true
          $( [ -n "$EGRESS_PEERS" ] && printf "  allowEgressTo:\n%s\n" "$EGRESS_PEERS" )
          VALUESEOF

      - name: Generate identity.yaml
        run: |
          SECRETS_YAML=""
          if [ -n "${{ inputs.key-vault-secrets }}" ]; then
            SECRETS_YAML=$(echo "${{ inputs.key-vault-secrets }}" | tr ',' '\n' | while read -r secret; do
              echo "  - ${secret}"
            done)
          fi

          cat > apps/${{ inputs.app-name }}/identity.yaml << IDEOF
          # Workload Identity config — read by Terraform (infra/apps/)
          namespace: ${{ inputs.namespace }}
          key_vault_secrets:
          $( [ -n "$SECRETS_YAML" ] && printf "%s\n" "$SECRETS_YAML" || echo "  []" )
          IDEOF

      - name: Generate app pipeline
        run: |
          cat > .github/workflows/${{ inputs.app-name }}.yml << 'EOF'
          name: "${{ inputs.app-name }}"

          on:
            push:
              branches: [main]
              paths:
                - "apps/${{ inputs.app-name }}/**"
            pull_request:
              branches: [main]
              paths:
                - "apps/${{ inputs.app-name }}/**"
            workflow_dispatch:
              inputs:
                image-tag:
                  description: "Image tag to deploy"
                  required: true
                  type: string

          jobs:
            deploy:
              uses: ./.github/workflows/deploy-app.yml
              with:
                app-name: ${{ inputs.app-name }}
                namespace: ${{ inputs.namespace }}
                image-tag: ${{ github.event.inputs.image-tag || 'latest' }}
              secrets: inherit
          EOF

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: onboard ${{ inputs.app-name }} in namespace ${{ inputs.namespace }}"
          title: "Onboard new app: ${{ inputs.app-name }} → ${{ inputs.namespace }}"
          body: |
            ## New Application Onboarding

            | Field | Value |
            |---|---|
            | App Name | `${{ inputs.app-name }}` |
            | Namespace | `${{ inputs.namespace }}` |
            | Team | `${{ inputs.team }}` |
            | Node Pool | `${{ inputs.node-pool }}` |
            | Gateway Host | `${{ inputs.host || 'none (internal only)' }}` |
            | Egress Peers | `${{ inputs.peers || 'none (fully isolated)' }}` |
            | Workload Identity | `${{ inputs.identity-client-id || 'run terraform apply after merge' }}` |
            | Key Vault Secrets | `${{ inputs.key-vault-secrets || 'none' }}` |

            **Files created:**
            - `apps/${{ inputs.app-name }}/values.yaml`
            - `apps/${{ inputs.app-name }}/identity.yaml`
            - `.github/workflows/${{ inputs.app-name }}.yml`

            **Next steps:**
            1. Review the generated files
            2. Merge this PR
            3. Run `cd infra/apps && terraform apply` to provision identity
            4. Copy the client ID from `terraform output -json app_client_ids`
            5. Set it in `apps/${{ inputs.app-name }}/values.yaml` → `workloadIdentity.clientId`
          branch: onboard/${{ inputs.app-name }}
          labels: onboarding
