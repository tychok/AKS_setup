name: Terraform Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-validate.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'infra/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/platform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ..

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint --format sarif > tflint-results.sarif
        continue-on-error: true

      - name: Upload TFLint results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tflint-results.sarif
          category: 'tflint'

      - name: Run Checkov (Policy as Code)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra
          framework: terraform
          quiet: false
          soft_fail: true
          skip_check: CKV_AZURE_1,CKV_AZURE_2
        continue-on-error: true

  terraform-plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/platform
    strategy:
      matrix:
        environment: [dev, staging, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan (${{ matrix.environment }})
        run: terraform plan -var-file=environments/${{ matrix.environment }}.tfvars -out=tfplan-${{ matrix.environment }}
        continue-on-error: true

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/platform/tfplan-${{ matrix.environment }}
          retention-days: 5
